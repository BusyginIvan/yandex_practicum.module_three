services:
  bank-ui:
    container_name: bank-ui
    image: bank-ui
    build:
      context: .
      dockerfile: bank-ui/Dockerfile
    depends_on:
      config-server:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  config-server:
    container_name: config-server
    image: config-server
    build:
      context: .
      dockerfile: config-server/Dockerfile
    restart: on-failure
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

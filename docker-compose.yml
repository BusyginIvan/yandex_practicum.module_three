services:
  bank-ui:
    container_name: bank-ui
    image: bank-ui
    build:
      context: .
      dockerfile: bank-ui/Dockerfile
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  config-server:
    container_name: config-server
    image: config-server
    build:
      context: .
      dockerfile: config-server/Dockerfile
    restart: on-failure
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
  eureka-server:
    container_name: eureka-server
    image: eureka-server
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    restart: on-failure
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.1.3
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: http://host.docker.internal:8083
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    entrypoint: ["/bin/sh", "/opt/keycloak/init/init-clients.sh"]
    ports:
      - "8083:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/init-clients.sh:/opt/keycloak/init/init-clients.sh:ro
      - ./keycloak/user-profile-attributes.json:/opt/keycloak/init/user-profile-attributes.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /realms/master/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
  gateway:
    container_name: gateway
    image: gateway
    build:
      context: .
      dockerfile: gateway/Dockerfile
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8084:8084"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8084/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  accounts:
    container_name: accounts
    image: accounts
    build:
      context: .
      dockerfile: accounts/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=accounts
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8085:8085"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8085/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  cash:
    container_name: cash
    image: cash
    build:
      context: .
      dockerfile: cash/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=cash
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8086:8086"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8086/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  transfers:
    container_name: transfers
    image: transfers
    build:
      context: .
      dockerfile: transfers/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=transfers
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8087:8087"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8087/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  notifications:
    container_name: notifications
    image: notifications
    build:
      context: .
      dockerfile: notifications/Dockerfile
    environment:
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?currentSchema=notifications
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8088:8088"
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8088/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  postgres:
    container_name: postgres
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  keycloak_data:
  pgdata:

apiVersion: v1
kind: Pod
metadata:
  name: bank-ui-test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget"]
      args: ["-qO-", "http://bank-ui{{ .Values.probes.path }}"]
  restartPolicy: Never

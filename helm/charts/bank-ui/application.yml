spring:
  application.name: bank-ui
  security.oauth2.client:
    provider.keycloak:
      authorization-uri: ${keycloak.issuer-uri}/protocol/openid-connect/auth
      token-uri: ${keycloak.openid-connect-uri}/token
      user-info-uri: ${keycloak.openid-connect-uri}/userinfo
      jwk-set-uri: ${keycloak.openid-connect-uri}/certs
      user-name-attribute: preferred_username
    registration.keycloak:
      provider: keycloak
      client-id: ${KEYCLOAK_BANK_UI_CLIENT_ID}
      client-secret: ${KEYCLOAK_BANK_UI_CLIENT_SECRET}
      client-name: Keycloak
      authorization-grant-type: authorization_code
      redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
      scope: openid, profile

keycloak.logout-uri: ${keycloak.issuer-uri}/protocol/openid-connect/logout

integration:
  accounts.base-url: http://gateway/accounts
  cash.base-url: http://gateway/cash
  transfers.base-url: http://gateway/transfers

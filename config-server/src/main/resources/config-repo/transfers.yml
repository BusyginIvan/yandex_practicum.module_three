spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa.hibernate.ddl-auto: validate
  sql.init.mode: never  # never, always
  security.oauth2:
    resourceserver.jwt.issuer-uri: ${keycloak.issuer-uri}
    client:
      provider.keycloak:
        issuer-uri: ${keycloak.issuer-uri}
      registration.transfers:
        provider: keycloak
        authorization-grant-type: client_credentials
        client-id: ${KEYCLOAK_TRANSFERS_CLIENT_ID:transfers}
        client-secret: ${KEYCLOAK_TRANSFERS_CLIENT_SECRET:transfers-secret}

integration:
  accounts.base-url: ${ACCOUNTS_BASE_URL:http://accounts/accounts}
  notifications.base-url: ${NOTIFICATIONS_BASE_URL:http://notifications/notifications}

transfers:
  retry:
    fixed-delay-ms: 5000
    batch-size: 50
  notifications:
    fixed-delay-ms: 5000
    batch-size: 50
  cleanup:
    cron: 0 0 12 * * *
    batch-size: 500

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .status-panel {
            position: fixed;
            right: 1rem;
            bottom: 0;
            z-index: 1080;
            padding: 1rem;
            pointer-events: none;
        }

        .status-panel .alert {
            width: fit-content;
            max-width: min(100vw - 4rem, 48rem);
            margin: 0 0 0 auto;
            pointer-events: auto;
            opacity: 1;
            animation: fade-out 0.6s ease 5s forwards;
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .container {
            width: min(100% - 3rem, 40rem);
            max-width: 40rem;
            margin: 0 auto;
        }

        .page-header h2 {
            margin-bottom: 0;
        }

        .logout-button {
            min-height: calc(1.5em + 0.75rem + 2px);
        }
    </style>
</head>

<body class="bg-light">
    <div class="status-panel">
        <div class="alert" role="alert" th:if="${message!=null}" th:classappend="' alert-' + ${messageType.alertClassSuffix()}" th:text="${message}"></div>
    </div>
    <div class="container p-2">
        <div class="page-header d-flex justify-content-between align-items-center gap-3 p-2">
            <h2><span class="badge text-bg-info text-white">Банк</span></h2>
            <form method="post" th:action="@{/logout}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-outline-secondary btn-sm logout-button">
                    <i class="bi bi-box-arrow-right"></i>
                    Выйти
                </button>
            </form>
        </div>
        <div class="row p-2"><div class="col"><div class="card">
            <div class="card-header">Обо мне</div>
            <div class="card-body gap-3">
                <form method="post" th:action="@{/account}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <h6><label for="name">Фамилия Имя</label></h6>
                        <p><input type="text" class="form-control" id="name" name="name" placeholder="Иванов Иван" th:value="${name}" required></p>
                    </div>
                    <div class="form-group">
                        <h6><label for="birthdate">Дата рождения</label></h6>
                        <p><input type="date" class="form-control" name="birthdate" id="birthdate" th:value="${birthdate}" required></p>
                    </div>
                    <div class="form-group">
                        <h6>Сумма на счету, руб</h6>
                        <p th:text="${balance}"></p>
                    </div>
                    <button type="submit" class="btn btn-secondary">Сохранить изменения</button>
                </form>
            </div>
        </div></div></div>
        <div class="row p-2"><div class="col"><div class="card">
            <div class="card-header">
                Операции с наличными
            </div>
            <div class="card-body gap-3">
                <form method="post" th:action="@{/cash}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <h6><label for="cash_amount">Сумма, руб.</label></h6>
                        <p><input type="number" class="form-control" id="cash_amount" name="amount" placeholder="0" min="1" required></p>
                    </div>
                    <button type="submit" class="btn btn-secondary" name="action" value="DEPOSIT">Положить</button>
                    <button type="submit" class="btn btn-secondary" name="action" value="WITHDRAW">Снять</button>
                </form>
            </div>
        </div></div></div>
        <div class="row p-2"><div class="col"><div class="card">
            <div class="card-header">Переводы</div>
            <div class="card-body gap-3">
                <form method="post" th:action="@{/transfer}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-group">
                        <h6><label for="to_account">Кому</label></h6>
                        <p><select class="form-select" id="to_account" name="login" required>
                            <option th:each="account : ${accounts}" th:value="${account.login}" th:text="${account.name}"></option>
                        </select></p>
                    </div>
                    <div class="form-group">
                        <h6><label for="transfer_amount">Сумма, руб.</label></h6>
                        <p><input type="number" class="form-control" name="amount" id="transfer_amount" placeholder="0" min="1" required></p>
                    </div>
                    <button type="submit" class="btn btn-secondary">Перевести</button>
                </form>
            </div>
        </div></div></div>
    </div>
</body>

</html>

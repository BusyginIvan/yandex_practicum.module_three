apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  strategy:
    type: Recreate
    rollingUpdate: null
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          envFrom:
            - secretRef:
                name: keycloak-admin-secret
            - secretRef:
                name: bank-ui-secret
            - secretRef:
                name: cash-secret
            - secretRef:
                name: transfers-secret
            - secretRef:
                name: accounts-secret
          env:
            - name: KC_HOSTNAME
              value: {{ printf "http://%s:%v" .Values.global.externalHost .Values.global.nodePorts.keycloak | quote }}
            - name: BANK_REALM
              value: {{ .Values.global.keycloak.realm | quote }}
            - name: BANK_UI_BASE_URL
              value: {{ printf "http://%s:%v" .Values.global.externalHost .Values.global.nodePorts.bankUi | quote }}
          volumeMounts:
            - name: data
              mountPath: /opt/keycloak/data
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.path }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: keycloak-data
